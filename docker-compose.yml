version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: web_portfolio_dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      # ⚠️ สำคัญ: ต้อง override DATABASE_URL ให้ชี้ไปที่ชื่อ service "postgres" (ไม่ใช่ localhost)
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-mydb}?schema=public
      # ตั้งค่า S3 (MinIO) ล่วงหน้าสำหรับ App
      - NEXT_PUBLIC_S3_ENDPOINT=http://localhost:9000 # สำหรับ Client (Browser)
      - S3_ENDPOINT=http://minio:9000 # สำหรับ Server (Docker Internal)
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-admin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-admin123}
    depends_on:
      - postgres
      - minio
    networks:
      - portfolio_net

  postgres:
    image: postgres:13
    container_name: postgres_web_portfolio
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - portfolio_net

  minio:
    image: minio/minio:latest
    container_name: minio_s3
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always
    networks:
      - portfolio_net

volumes:
  pgdata:
  minio_data:

networks:
  portfolio_net:
    driver: bridge
